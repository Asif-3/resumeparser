spring.data.mongodb.uri=mongodb://localhost:27017/jobportal
spring.data.mongodb.database=jobportal

server.port=8080

# File upload size limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Unified logging to single file
logging.file.name=logs/app.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%level] [%logger{36}] - %msg%n
logging.pattern.console=%d{HH:mm:ss.SSS} [%level] %msg%n
logging.level.com.jobportal=INFO